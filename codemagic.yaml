workflows:
  android-release:
    name: Elkhalfy IPTV - Android Release
    max_build_duration: 60
    environment:
      flutter: 3.24.5
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK (release)
        script: |
          flutter build apk --release --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - elkhalfy@admin.com
        notify:
          success: true
          failure: true
